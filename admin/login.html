<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — Heimish Discount</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: { bg: '#0A0A0A', surface: '#1A1A1A', primary: '#22C55E', 'primary-dark': '#16A34A', muted: '#6B7280', danger: '#EF4444' } } } };
</script>
</head>
<body class="bg-bg text-white min-h-screen flex items-center justify-center px-6">
  <div class="w-full max-w-md">
    <a href="../index.html" class="block text-center text-2xl font-bold text-primary mb-8">Heimish Discount</a>

    <div class="bg-surface rounded-2xl p-8 shadow-xl">
      <h1 class="text-2xl font-bold mb-2">Admin Login</h1>
      <p class="text-muted text-sm mb-6">Sign in to access the company dashboard.</p>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm text-muted mb-1">Email</label>
          <input type="email" required class="w-full bg-bg border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-primary focus:outline-none" placeholder="admin@heimishdiscount.com" />
        </div>
        <div>
          <label class="block text-sm text-muted mb-1">Password</label>
          <input type="password" required class="w-full bg-bg border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-primary focus:outline-none" placeholder="••••••••" />
        </div>

        <div id="error" class="hidden text-danger text-sm"></div>

        <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-black font-semibold rounded-lg py-3 transition">
          Sign In
        </button>
      </form>

      <p class="text-xs text-muted mt-6 text-center">
        Demo mode — any non-empty credentials will work. Replace with real auth (Supabase, etc.) before production.
      </p>
    </div>

    <a href="../index.html" class="block text-center text-sm text-muted mt-6 hover:text-white">← Back to site</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
